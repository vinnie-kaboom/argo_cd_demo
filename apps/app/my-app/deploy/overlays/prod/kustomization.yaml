# Production overlay – now matches staging
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - namespace.yaml

namespace: my-app

# Explicit image/tag for prod promotion
images:
  - name: my-app
    newName: docker.io/vincentzamora123/my-app
    newTag: "9d0b232"

# ─── Patch replicas for prod (match staging) ─────────────────────────────
patchesStrategicMerge:
  - |-
    apiVersion: argoproj.io/v1alpha1
    kind: Rollout
    metadata:
      name: my-app
    spec:
      replicas: 3

# ─── Patch canary steps for prod (match staging) ────────────────────────
  - |-
    apiVersion: argoproj.io/v1alpha1
    kind: Rollout
    metadata:
      name: my-app
    spec:
      strategy:
        canary:
          steps:
            - setWeight: 10
            - pause: {}
            - setWeight: 30
            - pause:
                duration: 1m
            - setWeight: 60
            - pause:
                duration: 1m

# ─── Override ConfigMap for prod (match staging) ────────────────────────
configMapGenerator:
  - name: my-app-config
    behavior: merge
    literals:
      - ENVIRONMENT=prod
      - LOG_LEVEL=error

# ─── Override Secret for prod (match staging) ───────────────────────────
secretGenerator:
  - name: my-app-secrets
    behavior: merge
    literals:
      - DATABASE_URL=postgres://prod-db.internal:5432/my-app-prod
