# Production overlay – conservative, fully tested
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - pdb.yaml
  - namespace.yaml


namespace: my-app

# Explicit image/tag for prod promotion
images:
  - name: my-app
    newName: docker.io/vincentzamora123/my-app
    newTag: "REPLACE_ME"

# ─── Patch replicas for prod (full HA) ────────────────────────────────────
patchesStrategicMerge:
  - |-
    apiVersion: argoproj.io/v1alpha1
    kind: Rollout
    metadata:
      name: my-app
    spec:
      replicas: 5    # keep base default for prod

# ─── Patch container resources for prod (optimized) ───────────────────────
  - |-
    apiVersion: argoproj.io/v1alpha1
    kind: Rollout
    metadata:
      name: my-app
    spec:
      template:
        spec:
          containers:
            - name: my-app
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi    # higher baseline for reliable performance
                limits:
                  cpu: 500m
                  memory: 256Mi

# ─── Patch canary steps for prod (cautious promotion) ─────────────────────
  - |-
    apiVersion: argoproj.io/v1alpha1
    kind: Rollout
    metadata:
      name: my-app
    spec:
      strategy:
        canary:
          steps:
            - setWeight: 5        # tiny 5% canary in prod
            - pause: {}           # manual gate
            - setWeight: 25
            - pause:
                duration: 3m      # long bake in prod
            - setWeight: 50
            - pause:
                duration: 5m      # extra validation
            - setWeight: 100

# ─── Override ConfigMap for prod ──────────────────────────────────────────
configMapGenerator:
  - name: my-app-config
    behavior: merge
    literals:
      - ENVIRONMENT=prod
      - LOG_LEVEL=error             # minimal logging in prod (performance)

# ─── Override Secret for prod ────────────────────────────────────────────
# In real production, use sealed-secrets or external-secrets,
# NOT literals in Kustomize. This is just for demonstration.
secretGenerator:
  - name: my-app-secrets
    behavior: merge
    literals:
      - DATABASE_URL=postgres://prod-db.internal:5432/my-app-prod
      - API_KEY=prod-key-xxxxx      # use actual secret management in production

# ─── Labels specific to prod ──────────────────────────────────────────────
commonLabels:
  environment: prod

# ─── Annotations specific to prod ────────────────────────────────────────
commonAnnotations:
  deployment-environment: production
  sla-tier: critical
