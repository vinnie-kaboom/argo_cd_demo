apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: agent-ops-dev
resources:
  - ../../base
patches:
  - target:
      kind: Namespace
      name: REPLACE_NAMESPACE
    patch: |-
      - op: replace
        path: /metadata/name
        value: agent-ops-dev
  - target:
      kind: ClusterRoleBinding
      name: agent-ops-cluster-rolebinding
    patch: |-
      - op: replace
        path: /subjects/0/namespace
        value: agent-ops-dev
  - target:
      kind: WorkflowTemplate
      name: agent-remediation
    patch: |-
      - op: replace
        path: /spec/arguments/parameters/5/value
        value: dev
