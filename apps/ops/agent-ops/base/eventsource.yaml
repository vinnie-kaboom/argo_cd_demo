apiVersion: argoproj.io/v1alpha1
kind: EventSource
metadata:
  name: agent-webhook
spec:
  service:
    ports:
      - port: 12000
        targetPort: 12000
  webhook:
    remediation:
      endpoint: /agent/remediate
      method: POST
      port: "12000"
    alertmanager:
      endpoint: /agent/alerts
      method: POST
      port: "12000"
