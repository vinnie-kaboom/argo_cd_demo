---
# Stable service – always points at the stable replica set.
# Argo Rollouts manages which pods this selector resolves to.
apiVersion: v1
kind: Service
metadata:
  name: my-app-stable
  namespace: my-app
  labels:
    app: my-app
spec:
  selector:
    app: my-app
  ports:
    - name: http
      port: 80
      targetPort: http
  type: ClusterIP
---
# Canary service – Argo Rollouts shifts this selector to canary pods
# during the rollout. Stable traffic is unaffected.
apiVersion: v1
kind: Service
metadata:
  name: my-app-canary
  namespace: my-app
  labels:
    app: my-app
spec:
  selector:
    app: my-app
  ports:
    - name: http
      port: 80
      targetPort: http
  type: ClusterIP
