# Helm values for my-app
# The `tag` field is automatically updated by the CI pipeline (ci.yaml)
# every time a new image is built and pushed.

image:
  repository: your-dockerhub-username/my-app  # replace with your DockerHub username
  tag: "latest"                                # CI overwrites this with the git SHA tag
  pullPolicy: IfNotPresent

replicaCount: 5   # Argo Rollout controls the actual replica split

service:
  stable:
    name: my-app-stable
    port: 80
    targetPort: 8080
  canary:
    name: my-app-canary
    port: 80
    targetPort: 8080

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

env:
  APP_COLOR: blue
