# =============================================================
# ArgoCD TLS Setup for Kind Cluster (Demo)
# =============================================================
# Apply with: kubectl apply -f tls-setup.yaml
#
# Prerequisites:
#   kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
#   kubectl wait --namespace cert-manager --for=condition=ready pod --all --timeout=120s
# =============================================================

---
# Step 1: Self-signed ClusterIssuer (bootstraps the CA)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}

---
# Step 2: Self-signed CA certificate
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-ca
  namespace: argocd
spec:
  isCA: true
  commonName: argocd-ca
  secretName: argocd-ca-secret
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer

---
# Step 3: Issuer that uses the CA above
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: argocd-issuer
  namespace: argocd
spec:
  ca:
    secretName: argocd-ca-secret

---
# Step 4: argocd-server TLS certificate
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-server-tls
  namespace: argocd
spec:
  secretName: argocd-server-tls
  issuerRef:
    name: argocd-issuer
    kind: Issuer
  dnsNames:
    - argocd-server
    - argocd-server.argocd.svc
    - argocd-server.argocd.svc.cluster.local
    - localhost

---
# Step 5: argocd-repo-server TLS certificate
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-repo-server-tls
  namespace: argocd
spec:
  secretName: argocd-repo-server-tls
  issuerRef:
    name: argocd-issuer
    kind: Issuer
  dnsNames:
    - argocd-repo-server
    - argocd-repo-server.argocd.svc
    - argocd-repo-server.argocd.svc.cluster.local

---
# Step 6: argocd-dex-server TLS certificate
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-dex-server-tls
  namespace: argocd
spec:
  secretName: argocd-dex-server-tls
  issuerRef:
    name: argocd-issuer
    kind: Issuer
  dnsNames:
    - argocd-dex-server
    - argocd-dex-server.argocd.svc
    - argocd-dex-server.argocd.svc.cluster.local
