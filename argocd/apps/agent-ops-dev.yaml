---
# Deploys Agent Ops for the DEV environment.
#
# Agent Ops listens for alerts or webhooks in dev, records events, and can auto-fix or trigger GitHub PRs for remediation.
# All resources are deployed to the agent-ops-dev namespace.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agent-ops-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: ai-platform
  source:
    repoURL: https://github.com/vinnie-kaboom/argo_cd_demo.git
    targetRevision: HEAD
    path: apps/ops/agent-ops/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: agent-ops-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
