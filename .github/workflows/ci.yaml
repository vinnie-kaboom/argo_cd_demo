name: GitOps - Promote my-app Image Tag

# About repository_dispatch and my-app-image-published:
# - This workflow is triggered by a repository_dispatch event with type my-app-image-published.
# - The event is sent from the my-app repo (or any other workflow/script) when a new Docker image is built and pushed.
# - The event payload includes the new image tag and the target environment (dev, staging, or prod).
# - When this event is received, this workflow updates the image tag in the correct values.yaml file so Argo CD can deploy the new version.


# Purpose:
# - Update the image tag in this GitOps repo for one environment (dev/staging/prod).
# - Commit that change so Argo CD can detect it and deploy the new version.
#
# Important:
# - This workflow does NOT build or push images to DockerHub.
# - The tag comes from:
#   1) repository_dispatch payload (usually sent by a build/publish pipeline after push to DockerHub), or
#   2) manual workflow_dispatch input.
on:
  repository_dispatch:
    types:
      - my-app-image-published
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to promote in GitOps"
        required: true
        type: string
      target_env:
        description: "Environment values file to update"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  VALUES_ROOT: apps/app/my-app/deploy/overlays

jobs:
  update-image-tag:
    name: Update image tag in GitOps values file
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve requested image tag and environment
        id: vars
        env:
          DISPATCH_TAG: ${{ github.event.client_payload.image_tag }}
          DISPATCH_ENV: ${{ github.event.client_payload.target_env }}
          INPUT_TAG: ${{ inputs.image_tag }}
          INPUT_ENV: ${{ inputs.target_env }}
        run: |
          # Prefer dispatch payload (automation), fallback to manual input.
          TAG="${DISPATCH_TAG:-$INPUT_TAG}"
          if [[ -z "$TAG" ]]; then
            echo "image_tag is required via repository_dispatch.client_payload.image_tag or workflow_dispatch input"
            exit 1
          fi

          # Resolve environment and validate allowed values.
          TARGET_ENV="${DISPATCH_ENV:-$INPUT_ENV}"
          TARGET_ENV="${TARGET_ENV:-dev}"
          case "$TARGET_ENV" in
            dev|staging|prod) ;;
            *)
              echo "target_env must be one of: dev, staging, prod"
              exit 1
              ;;
          esac

              # Build the exact values file path that will be edited.
          VALUES_FILE="${{ env.VALUES_ROOT }}/${TARGET_ENV}/values.yaml"

          echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "target_env=$TARGET_ENV" >> "$GITHUB_OUTPUT"
          echo "values_file=$VALUES_FILE" >> "$GITHUB_OUTPUT"

      - name: Update selected environment image tag
        env:
          NEW_TAG: ${{ steps.vars.outputs.image_tag }}
          TARGET_ENV: ${{ steps.vars.outputs.target_env }}
          VALUES_FILE: ${{ steps.vars.outputs.values_file }}
        run: |
          # Replace only the Helm image.tag line in the selected environment values file.
          sed -i "s|^  tag:.*|  tag: \"${NEW_TAG}\"|" "${VALUES_FILE}"
          echo "Updated ${VALUES_FILE} -> tag: ${NEW_TAG} (env=${TARGET_ENV})"

      - name: Commit and push
        env:
          NEW_TAG: ${{ steps.vars.outputs.image_tag }}
          TARGET_ENV: ${{ steps.vars.outputs.target_env }}
          VALUES_FILE: ${{ steps.vars.outputs.values_file }}
        run: |
          # Commit only if the file actually changed.
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${VALUES_FILE}"
          git diff --cached --quiet && echo "No changes to commit" && exit 0

          # This push is the GitOps trigger: Argo CD sees new Git commit and syncs cluster state.
          git commit -m "gitops: promote my-app ${TARGET_ENV} image to ${NEW_TAG} [skip ci]"
          git push
