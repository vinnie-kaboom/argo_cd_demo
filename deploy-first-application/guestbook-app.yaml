apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: guestbook
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/vinnie-kaboom/argocd-example-apps-1.git
    targetRevision: HEAD
    path: helm-guestbook
    helm:
      valueFiles:
        - values-custom.yaml
      valuesObject:
        replicaCount: 2 
  destination:
    server: https://kubernetes.default.svc
    namespace: default